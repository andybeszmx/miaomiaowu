name: 前端构建部署
on:
  push:
    branches:
      - master  

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22  # 升级到 22 解决 deprecated 警告
          cache: 'pnpm'     # 直接配置 pnpm 缓存

      - name: 安装 pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: 安装依赖 + 构建
        run: |
          pnpm install
          pnpm run build

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4  # 升级到 v4 解决警告
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
